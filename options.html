<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Rules</title>
  <link rel="stylesheet" href="options.css">
</head>

<body>
  <div class="wrap">
    <header style="display:flex; justify-content:space-between; align-items:center;">
      <h1>URL Redirect Rules</h1>
      <div style="display:flex; gap:8px;">
        <button class="secondary" id="exportBtn" style="padding: 6px 12px; margin: 0;">Export</button>
        <button class="secondary" id="importBtn" style="padding: 6px 12px; margin: 0;">Import</button>
        <input type="file" id="importFile" accept=".json" style="display:none;">
      </div>
    </header>

    <div class="panel">
      <div class="add-row">
        <div class="add-row-top">
          <div class="toggle-advanced">
            <span>Simple</span>
            <label class="mini-switch">
              <input type="checkbox" id="advancedToggle">
              <span class="mini-slider"></span>
            </label>
            <span>Advanced</span>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="secondary" id="cancelEditBtn" style="display: none;">Cancel</button>
            <button class="add" id="addBtn">Add rule</button>
          </div>
        </div>
        <div id="simpleInputs" class="add-row-inputs">
          <input type="text" id="fromInput" placeholder="From, e.g. redditez.com" />
          <span class="arrow">to</span>
          <input type="text" id="toInput" placeholder="To, e.g. reddit.com" />
        </div>
        <div id="advancedInputs" class="advanced-row-inputs" style="display:none;">
          <input type="text" id="regexFromInput" placeholder="From regex, e.g. ^https://(www\.)?redditez\.com" />
          <input type="text" id="regexToInput" placeholder="To substitution, e.g. https://reddit.com" />
          <input type="text" id="regexTestInput" placeholder="Test URL (optional)" />
          <div id="regexTestResult" class="test-result"></div>
        </div>
      </div>
      <ul id="ruleList"></ul>
      <div class="empty" id="emptyMsg" style="display:none;">No rules yet. Add your first URL pair above.</div>
    </div>

    <p class="note">
      Simple mode matches the whole domain, ignoring leading "www.". Advanced mode uses regex syntax for matching and
      substitution.
    </p>
  </div>

  <div id="toast" class="toast" style="display:none;">
    <span id="toastMsg">Rule deleted.</span>
    <button id="undoBtn" class="undo-btn">Undo</button>
  </div>

  <script src="options.js"></script>
</body>

</html>
