name: Auto Release on Commit
on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check version change in manifest.json
        id: check-version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('./manifest.json', 'utf8'));
            const currentVersion = manifest.version;
            core.setOutput('version', currentVersion);

            if (context.eventName === 'workflow_dispatch') {
              console.log(`Manual trigger (workflow_dispatch). Proceeding with version ${currentVersion}.`);
              core.setOutput('changed', 'true');
              return currentVersion;
            }

            try {
              const { execSync } = require('child_process');
              const prevManifestStr = execSync('git show HEAD~1:manifest.json', { encoding: 'utf8' });
              const prevManifest = JSON.parse(prevManifestStr);
              if (prevManifest.version === currentVersion) {
                console.log(`manifest.json was modified, but version remains ${currentVersion}. Skipping release.`);
                core.setOutput('changed', 'false');
              } else {
                console.log(`Version changed from ${prevManifest.version} to ${currentVersion}. Proceeding with release.`);
                core.setOutput('changed', 'true');
              }
            } catch (err) {
              console.log('Could not compare with previous commit. Proceeding with release.');
              core.setOutput('changed', 'true');
            }
            return currentVersion;
          result-encoding: string

      - name: Generate changelog and update tag
        if: steps.check-version.outputs.changed == 'true'
        id: changelog
        run: |
          CURRENT_VERSION="v${{ steps.check-version.outputs.version }}"
          
          # Find the previous tag (ignoring the current one if it already exists)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$CURRENT_VERSION$" | head -n 1)
          
          if [ -z "$PREV_TAG" ]; then
            # If no previous tag, get all commits except ci: and docs:
            CHANGELOG=$(git log -E --grep="^(ci|docs):" --invert-grep -i --format="* %s (%h)")
          else
            # Get all commits since the previous version tag except ci: and docs:
            CHANGELOG=$(git log -E ${PREV_TAG}..HEAD --grep="^(ci|docs):" --invert-grep -i --format="* %s (%h)")
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="* Maintenance and release updates."
          fi
          
          # Move the current version tag to the latest commit so source code zips update
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$CURRENT_VERSION"
          git push -f origin "$CURRENT_VERSION"
          
          # Output for next step
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package extension
        if: steps.check-version.outputs.changed == 'true'
        run: |
          mkdir -p dist
          
          # 1. Unsigned Firefox version
          zip -r dist/simple-url-redirector-firefox-unsigned.zip \
            icons/ \
            background.js \
            content.js \
            manifest.json \
            options.css \
            options.html \
            options.js \
            popup.css \
            popup.html \
            popup.js \
            rules-common.js \
            LICENSE

          # 2. Unsigned Chromium/Edge version (strict MV3 without background.scripts)
          mkdir -p build-chromium
          cp -r icons background.js content.js manifest.json options.css options.html options.js popup.css popup.html popup.js rules-common.js LICENSE build-chromium/
          jq 'del(.background.scripts)' build-chromium/manifest.json > build-chromium/manifest_tmp.json && mv build-chromium/manifest_tmp.json build-chromium/manifest.json
          cd build-chromium
          zip -r ../dist/simple-url-redirector-chromium.zip *
          cd ..

      - name: Sign Firefox Extension (.xpi & .zip)
        if: steps.check-version.outputs.changed == 'true' && env.FIREFOX_API_KEY != '' && env.FIREFOX_API_SECRET != ''
        env:
          FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
          FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
        run: |
          mkdir -p web-ext-out
          npx -y web-ext sign \
            --source-dir . \
            --artifacts-dir web-ext-out \
            --channel unlisted \
            --api-key "$FIREFOX_API_KEY" \
            --api-secret "$FIREFOX_API_SECRET"
          
          XPI_FILE=$(find web-ext-out -name "*.xpi" | head -n 1)
          if [ -n "$XPI_FILE" ]; then
            cp "$XPI_FILE" dist/simple-url-redirector-firefox-signed.xpi
            cp "$XPI_FILE" dist/simple-url-redirector-firefox-signed.zip
            echo "Created: dist/simple-url-redirector-firefox-signed.xpi"
            echo "Created: dist/simple-url-redirector-firefox-signed.zip"
          fi

      - name: Create Release
        if: steps.check-version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/simple-url-redirector-chromium.zip
            dist/simple-url-redirector-firefox-unsigned.zip
            dist/simple-url-redirector-firefox-signed.zip
            dist/simple-url-redirector-firefox-signed.xpi
          fail_on_unmatched_files: false
          tag_name: v${{ steps.check-version.outputs.version }}
          name: Release v${{ steps.check-version.outputs.version }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
            
            Full Changelog: https://github.com/${{ github.repository }}/commits/v${{ steps.check-version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

