name: Auto Release on Commit
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: get-version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('./manifest.json', 'utf8'));
            return manifest.version;
          result-encoding: string

      - name: Generate changelog and update tag
        id: changelog
        run: |
          CURRENT_VERSION="v${{ steps.get-version.outputs.result }}"
          
          # Find the previous tag (ignoring the current one if it already exists)
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^$CURRENT_VERSION$" | head -n 1)
          
          if [ -z "$PREV_TAG" ]; then
            # If no previous tag, get all commits
            CHANGELOG=$(git log --format="* %s (%h)%n%b")
          else
            # Get all commits since the previous version tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --format="* %s (%h)%n%b")
          fi
          
          # Move the current version tag to the latest commit so source code zips update
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$CURRENT_VERSION"
          git push -f origin "$CURRENT_VERSION"
          
          # Output for next step
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r dist/simple-url-redirector.zip \
            icons/ \
            background.js \
            content.js \
            manifest.json \
            options.css \
            options.html \
            options.js \
            popup.css \
            popup.html \
            popup.js \
            LICENSE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-url-redirector.zip
          tag_name: v${{ steps.get-version.outputs.result }}
          name: Release v${{ steps.get-version.outputs.result }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
            
            Full Changelog: https://github.com/${{ github.repository }}/commits/v${{ steps.get-version.outputs.result }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: dist/simple-url-redirector.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}
