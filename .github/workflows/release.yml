name: Auto Release on Commit
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: get-version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('./manifest.json', 'utf8'));
            return manifest.version;
          result-encoding: string

      - name: Generate changelog
        id: changelog
        run: |
          # Get the latest tag (if any)
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LATEST_TAG" ]; then
            # If no previous tag, get all commits
            CHANGELOG=$(git log --format="* %s (%h)%n%b")
          else
            # Get commits since last tag
            CHANGELOG=$(git log ${LATEST_TAG}..HEAD --format="* %s (%h)%n%b")
          fi
          
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r dist/simple-url-redirector.zip \
            icons/ \
            background.js \
            content.js \
            manifest.json \
            options.css \
            options.html \
            options.js \
            popup.css \
            popup.html \
            popup.js \
            LICENSE

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-url-redirector.zip
          tag_name: v${{ steps.get-version.outputs.result }}
          name: Release v${{ steps.get-version.outputs.result }}
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}
            
            Full Changelog: https://github.com/${{ github.repository }}/commits/v${{ steps.get-version.outputs.result }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

